openapi: 3.1.0
info:
  title: Calora Food Recognition API
  version: 0.1.0-draft
  description: |
    Draft, local-first contract for food recognition suggestions. It does not
    calculate nutrition or create diary entries. All detected items remain
    user-editable suggestions.
servers:
  - url: http://127.0.0.1:8000
    description: Optional local development server only
paths:
  /v1/food-recognition:predict:
    post:
      summary: Detect food items in one meal image
      operationId: predictFoodItems
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: JPEG, PNG, or HEIC image. The server must enforce size and pixel limits.
                client_request_id:
                  type: string
                  format: uuid
                  description: Client-generated correlation ID; do not use as a user identifier.
      responses:
        '200':
          description: Recognition completed. An empty items list is a valid no-result response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodRecognitionResponse'
        '400': { $ref: '#/components/responses/InvalidImage' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '413': { $ref: '#/components/responses/ImageTooLarge' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/Unavailable' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
  responses:
    InvalidImage:
      description: Unsupported, unreadable, or malformed image.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthenticated:
      description: Missing or invalid user authentication.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ImageTooLarge:
      description: Image exceeds a documented server limit.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
      description: Request quota exceeded.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unavailable:
      description: Recognition is unavailable; client must offer manual entry.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    FoodRecognitionResponse:
      type: object
      required: [model_version, items]
      properties:
        model_version:
          type: string
          examples: [food-detector-0.1.0]
        items:
          type: array
          description: Items above the model's candidate threshold; may be empty.
          items: { $ref: '#/components/schemas/DetectedFoodItem' }
        warnings:
          type: array
          items: { type: string }
          examples: [["Recognition is a suggestion. Confirm food and portion before saving."]]
    DetectedFoodItem:
      type: object
      required: [detection_id, label, display_name, confidence, bounding_box, candidates]
      properties:
        detection_id: { type: string, examples: [det_01] }
        label:
          type: string
          description: Stable canonical model taxonomy ID, never a nutrition database ID.
          examples: [grilled_chicken]
        display_name: { type: string, examples: [Grilled chicken] }
        confidence: { type: number, minimum: 0, maximum: 1, examples: [0.87] }
        bounding_box: { $ref: '#/components/schemas/NormalizedBoundingBox' }
        candidates:
          type: array
          minItems: 1
          maxItems: 5
          items: { $ref: '#/components/schemas/FoodCandidate' }
        portion_grams:
          type: number
          nullable: true
          description: Reserved for a separately validated portion model. Must be null in v1.
    FoodCandidate:
      type: object
      required: [label, display_name, score]
      properties:
        label: { type: string, examples: [grilled_chicken] }
        display_name: { type: string, examples: [Grilled chicken] }
        score: { type: number, minimum: 0, maximum: 1, examples: [0.87] }
    NormalizedBoundingBox:
      type: object
      description: Coordinates are fractions of the orientation-corrected image; origin is top-left.
      required: [x, y, width, height]
      properties:
        x: { type: number, minimum: 0, maximum: 1 }
        y: { type: number, minimum: 0, maximum: 1 }
        width: { type: number, exclusiveMinimum: 0, maximum: 1 }
        height: { type: number, exclusiveMinimum: 0, maximum: 1 }
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { type: string, examples: [recognition_unavailable] }
        message: { type: string, examples: [Food recognition is temporarily unavailable. Add food manually.] }
