# Documentation/configuration for the later Calora multi-food detection set.
# This is not a detector training configuration until annotated data exists.
dataset_name: calora_multifood_v1
format: coco_detection
root: ../../data/processed/calora_multifood_v1

splits:
  train_images: images/train
  validation_images: images/val
  test_images: images/test
  train_annotations: annotations/instances_train.json
  validation_annotations: annotations/instances_val.json
  test_annotations: annotations/instances_test.json

required_coco_fields:
  image: [id, file_name, width, height, meal_capture_id]
  annotation: [id, image_id, category_id, bbox, area, iscrowd]
  category: [id, name, canonical_food_id]

annotation_rules:
  bbox: "[x_min, y_min, width, height] in image pixels"
  one_annotation_per_visible_food: true
  include_unknown_food_category: true
  exclude_unidentifiable_food: false
  group_split_by: meal_capture_id
  required_reviewers: 2

optional_future_fields:
  - segmentation
  - preparation_method
  - verified_grams
  - fooddata_central_id
  - consented_for_training

model_contract:
  input: "orientation-corrected RGB JPEG/PNG"
  output_per_detection: [canonical_food_id, display_name, confidence, bbox, candidates]
  confidence_policy: "Return an unknown/manual-review state below the product threshold."
